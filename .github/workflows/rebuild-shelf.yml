name: Rebuild bookshelf

on:
  schedule:
    # GitHub Actions cron 默认 UTC，对应北京时间周一凌晨 02:00
    - cron: '0 18 * * 0'
  workflow_dispatch: {}

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Fetch weread shelf
        env:
          WEREAD_API_KEY: ${{ secrets.WEREAD_API_KEY }}
        run: python scripts/fetch_weread.py

      - name: Build shelf
        run: python scripts/build_shelf.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- index.html data/raw-shelf.json; then
            echo "No changes, skip commit."
          else
            git add index.html data/raw-shelf.json
            git commit -m "chore: weekly weread shelf sync (auto)"
            git push
          fi
